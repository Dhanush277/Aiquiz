{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center animate-fade-in">
    <div class="col-md-6">
        <div class="glass-card p-5 text-center">
            <h2 class="mb-4 text-gradient">Join a Quiz</h2>
            <form method="POST" action="{{ url_for('main.route_join_quiz') }}">
                <div class="mb-4">
                    <input type="text" class="form-control form-control-lg text-center" name="quiz_code" placeholder="Enter Quiz Code (e.g. QZ8K2X91A)" required autocomplete="off" style="letter-spacing: 2px; font-weight: bold;">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-gradient btn-lg">Join Now</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
