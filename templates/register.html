{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center animate-fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5">
            <h2 class="text-center mb-4 text-gradient">Create Account</h2>
            <form method="POST" action="{{ url_for('main.register') }}">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="fullname" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Role</label>
                    <select class="form-select" name="role" required>
                        <option value="participant" selected>Participant</option>
                        <option value="host">Host</option>
                    </select>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-gradient py-2">Register</button>
                </div>
            </form>
            <p class="text-center mt-4 mb-0">Already have an account? <a href="{{ url_for('main.login') }}" class="text-info">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
